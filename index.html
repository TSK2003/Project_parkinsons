<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkinson Voice Portal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ecfeff, #fff7ed);
      color: #122029;
    }

    main {
      width: min(680px, calc(100% - 32px));
      padding: 32px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 40px rgba(18, 32, 41, 0.08);
      text-align: center;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 14px;
      background: #14746f;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }

    p {
      line-height: 1.7;
      color: #526168;
    }

    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Parkinson Voice Portal</h1>
    <p>
      This project now runs through the Flask portal with patient login, doctor login,
      saved reports, and the upgraded voice analysis flow.
    </p>
    <p>Start the server with <code>python3 app.py</code> and open the portal at <code>http://127.0.0.1:5000</code>.</p>
    <a href="http://127.0.0.1:5000">Open Portal</a>
  </main>
</body>
</html>
