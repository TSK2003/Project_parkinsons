{% extends "base.html" %}

{% block title %}Patient Register{% endblock %}

{% block content %}
  <section class="auth-wrap">
    <article class="auth-card wide">
      <span class="eyebrow">Patient account</span>
      <h1>Create Patient Login</h1>
      <p class="muted">Register once, then use your patient login to upload voice samples and save reports.</p>

      <form method="post" class="stack-form">
        <div class="form-grid">
          <label class="field">
            <span>Full Name</span>
            <input type="text" name="full_name" placeholder="Patient full name" required>
          </label>

          <label class="field">
            <span>Username</span>
            <input type="text" name="username" placeholder="Choose username" required>
          </label>
        </div>

        <div class="form-grid">
          <label class="field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Minimum 6 characters" required>
          </label>

          <label class="field">
            <span>Confirm Password</span>
            <input type="password" name="confirm_password" placeholder="Repeat password" required>
          </label>
        </div>

        <button class="btn btn-primary btn-block" type="submit">Create Patient Account</button>
      </form>

      <p class="auth-footnote">Already registered? <a class="text-link" href="{{ url_for('patient_login') }}">Go to patient login</a></p>
    </article>
  </section>
{% endblock %}
